<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="NoSleep/NoSleep.min.js"></script>
    <style>
      body {
        margin: 0;
      }

      #main {
        padding: 0.5em;
        height:100%;
        width: 100%;
        box-sizing: border-box;
      }

      p {
        color: gray;
      }

      input, button {
        font-size: 20px;
        color: gray;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <p>Provide the desired BPM and click run. Auto-sleep will be disabled on your phone while this is running.</p>
      <input type="text" id="bpm" placeholder="160"><button id="run">Run</button>
    </div>
    <script>
      var noSleep = new NoSleep();

      let timer = null;
      let run = document.getElementById('run');

      run.onclick = function(){
        if (timer === null) {
          let bpm = parseInt(document.getElementById('bpm').value);
          if (! bpm) {
            bpm = 160;
          }

          timer = setInterval(function(){
            let style = document.getElementById('main').style;
            if (style.backgroundColor == 'black') {
              style.backgroundColor = 'white';
            } else {
              style.backgroundColor = 'black';
            }
          }, 60000 / bpm / 2);

          noSleep.enable();
          document.body.requestFullscreen()
          run.textContent = 'Stop';
        } else {
          clearInterval(timer);
          timer = null;

          noSleep.disable();
          document.exitFullscreen();
          run.textContent = 'Run';
        }
      };
    </script>
  </body>
</html>
